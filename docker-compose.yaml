name: roboshop
services:
  mongodb:
    build: ./mongodb
    image: dharma006/mongodb:4.0.0 # docker build -t joindevops/mongodb:4.0.0
    container_name: mongodb # docker run -d --network roboshop joindevops/mongodb:4.0.0
    #volumes:
    #- mongodb:/data/db # mongodb stores data in /data/db directory
  catalogue:
    build: ./catalogue
    image: dharma006/catalogue:4.0.0
    container_name: catalogue
    depends_on:
    - mongodb
  frontend:
    build: ./frontend
    image: dharma006/frontend:4.0.0
    container_name: frontend
    ports:
    - "80:80"
    depends_on:
    - catalogue
    - user
    - cart
    - shipping
    - payment
  user:
    build: ./user
    image: dharma006/user:4.0.0
    container_name: user
    environment:
       MONGO: true 
       REDIS_URL: 'redis://redis:6379'
       MONGO_URL : 'mongodb://mongodb:27017/user'
    depends_on:
    - redis
    - mongodb
  cart:
    build: ./cart
    image: dharma006/cart:4.0.0
    container_name: cart
    environment:
       REDIS_HOST: 'redis'
       CATALOGUE_HOST: 'catalogue'
       CATALOGUE_PORT: '8080'
  shipping:
    build: ./shipping
    image: dharma006/shipping:4.0.0
    container_name: shipping
    environment:
       CART_ENDPOINT: 'cart'
       DB_HOST: mysql
    depends_on:
    - mysql
    - cart
  payment:
    image: dharma006/payment:4.0.0
    build: ./payment
    container_name: payment
    environment:
      CART_HOST: 'cart'
      CART_PORT: '8080'
      USER_HOST: 'user'
      USER_PORT: '8080'
      AMQP_HOST: 'rabbitmq'
      AMQP_USER: 'roboshop'
      AMQP_PASS: 'roboshop123'
    depends_on:
    - cart
    - user
    - rabbitmq
  mysql:
    image: dharma006/mysql:4.0.0
    build: ./mysql
    container_name: mysql
    command: --mysql-native-password=ON --innodb-lock_wait_timeout=120
    environment:
      MYSQL_ROOT_PASSWORD: "RoboShop@1"
  redis:
    image: redis:7
    container_name: redis # docker build -d --nmae redis --name network roboshop redis:7
  rabbitmq:
    image: rabbitmq:3
    container_name: rabbitmq
    environment: # these are user id and password for rabitmq login
      RABBITMQ_DEFAULT_USER: roboshop
      RABBITMQ_DEFAULT_PASS: roboshop123
networks:
  default: # this means all the services in this file use this network
    name: roboshop
    driver: bridge
    external: false # if true it should be created manually, if false docker creates this network